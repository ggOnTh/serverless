<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감정일기 - 당신의 매일을 기록하세요</title>
  <meta name="description" content="AI가 일상을 분석하고 당신의 감정을 돌봐주는 개인용 감정 일기 애플리케이션입니다.">
  <meta property="og:title" content="AI 감정일기">
  <meta property="og:description" content="AI가 분석하는 나의 하루 감정 리포트">
  <link rel="stylesheet" href="index.css">
  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- 인증 화면 (Login / Sign up) -->
  <div id="auth-container" class="container auth-container">
    <header>
      <h1>AI 감정 일기</h1>
      <p class="subtitle">오늘의 마음을 기록하고 치유받으세요</p>

    <div class="auth-box">
      <div class="input-group">
        <label for="auth-email">이메일</label>
        <input type="email" id="auth-email" placeholder="email@example.com">
      </div>
      <div class="input-group">
        <label for="auth-password">비밀번호</label>
        <input type="password" id="auth-password" placeholder="••••••••">
      </div>
      
      <div class="auth-buttons">
        <button id="login-btn" class="btn btn-primary">로그인</button>
        <button id="signup-btn" class="btn btn-outline">회원가입</button>
      </div>

      <div class="divider">
        <span>또는</span>
      </div>

      <button id="google-login-btn" class="btn btn-google">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        <span>Google로 로그인</span>
      </button>
    </div>
  </div>

  <!-- 다이어리 앱 화면 -->
  <main id="app-container" class="container" style="display: none;">
    <header>
      <div class="user-status">
        <span id="user-email"></span>
        <button id="logout-btn" class="btn-sm">로그아웃</button>
      </div>
      <h1>오늘의 하루는 어땠나요?</h1>
    </header>

    <div class="input-section">
      <label for="diary-input" class="sr-only">당신의 일기를 작성하세요</label>
      <textarea id="diary-input" placeholder="오늘 겪었던 일이나 느꼈던 감정을 자유롭게 적어보세요..."></textarea>
      
      <div class="button-group">
        <button id="voice-btn" class="btn btn-voice">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
          <span>음성으로 입력하기</span>
        </button>
        <button id="analyze-btn" class="btn btn-analyze">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09Z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"/><path d="M9 12H4s.55-3.03 2-4.5c1.11-1.12 2.87-1.4 4.34-1.25"/><path d="M15 15v5s3.03-.55 4.5-2c1.12-1.11 1.4-2.87 1.25-4.34"/><path d="m15 9-9 9"/></svg>
          <span>분석 요청하기</span>
        </button>
      </div>
    </div>

    <div class="result-section">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        AI의 답변
      </h2>
      <div id="ai-result" class="result-box">
        여기에 AI 답변이 표시됩니다.
      </div>
      <div id="loading" class="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="history-section">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/><circle cx="12" cy="12" r="3"/></svg>
        나의 일기 히스토리
      </h2>
      <div id="history-container" class="history-container">
        <!-- 일기 카드들이 여기에 동적으로 렌더링 됩니다. -->
        <p class="empty-msg">기록을 불러오는 중...</p>
      </div>
    </div>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
